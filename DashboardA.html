<html>
    <head>
        <title>Dashboard Template</title>
        <meta charset="UTF-8">
        <meta name="author" content="Michael Scaggs">
        <style>
            /* Navbar container */
            .navbar {
                background-color: #333;
                font-family: Arial;
            }
            /* Links inside the navbar */
            .navbar a {
                display: inline-block;
                font-size: 12px;
                color: white;
                text-align: center;
                padding: 10px 12px;
                text-decoration: none;
            }
            /* The dropdown container */
            .dropdown {
                float: left;
                overflow: hidden;
            }
            /* Dropdown button */
            .dropdown .dropbtn {
                font-size: 12px;
                border: none;
                outline: none;
                color: white;
                padding: 10px 12px;
                background-color: inherit;
                font-family: inherit; /* Important for vertical align on mobile phones */
                margin: 0; /* Important for vertical align on mobile phones */
            }
            .dropdown2 .dropbtn2 {
                font-size: 12px;
                border: none;
                outline: none;
                color: white;
                padding: 10px 12px;
                background-color: inherit;
                font-family: inherit; /* Important for vertical align on mobile phones */
                margin: 0; /* Important for vertical align on mobile phones */
            }
            /* Add a red background color to navbar links on hover */
            .navbar a:hover, .dropdown:hover .dropbtn {
                background-color: red;
            }
            /* Dropdown content (hidden by default) */
            .dropdown-content {
                display: none;
                position: absolute;
                background-color: #f9f9f9;
                min-width: 100px;
                box-shadow: 0px 8px 16px 0px rgba(0,0,0,0.2);
                z-index: 1;
            }
            .dropdown-content-2 {
                display: none;
                position: absolute;
                background-color: #f9f9f9;
                min-width: 160px;
                box-shadow: 0px 8px 16px 0px rgba(0,0,0,0.2);
                z-index: 2;
            }
            /* Links inside the dropdown */
            .dropdown-content a {
                float: none;
                color: black;
                padding: 10px 12px;
                text-decoration: none;
                display: block;
                text-align: left;
            }
            /* Add a grey background color to dropdown links on hover */
            .dropdown-content a:hover {
                background-color: #ddd;
            }
            /* Show the dropdown menu on hover */
            .dropdown:hover .dropdown-content {
                display: block;
            }
            /* Container for all clocks - top right corner */
            /* Floating Clock Style */
            .clock-container {
                position: -webkit-sticky;
                position: sticky;
                top: 10px;       /* 10 pixels from the top */
                right: 10px;     /* 10 pixels from the right */
                background-color: #000;
                color: rgb(0, 255, 0);
                display: flex;
                flex-direction: row;
                padding: 10px;
                border-radius: 5px;
                font-family: monospace;
                z-index: 1000; /* Ensures the clock is above other content */
            }
            /* Styling for each individual clock */
            .clock-card {
                font-size: 12px;
                text-align: right;
                min-width: 200px;
                backdrop-filter: blur(5px);
            }
            .clock-card2 {
                font-size: 12px;
                text-align: center;
                min-width: 100px;
                background-color: #FFF;
                backdrop-filter: blur(5px);
            }
            .clock-card-spacer {
                font-size: 12px;
                text-align: center;
                min-width: 60px;
                backdrop-filter: blur(5px);
            }
            .city-name { font-weight: bold; color: #4CAF50; }
            .time-display { font-family: monospace; font-size: 1.2em; }
            .date-display { font-size: 0.85em; }
            .container {
                display: grid;
                /* Creates 3 columns, each taking up 1 fractional unit of space */
                grid-template-columns: 37% 63%; 
                /* Adds space between the grid items */
                gap: 10px;
                margin-top: 50px; 
                }
            .container2 {
                display: grid;
                /* Creates 3 columns, each taking up 1 fractional unit of space */
                grid-template-columns: repeat(1, 1fr); 
                /* Adds space between the grid items */
                gap: 20px;
                margin-top: 10px; 
            }
            .item {
                background-color: #000;
                color: white;
                padding: 0px;
                text-align: Left;
                border-radius: 0px;
            }
            iframe{
                width: fit-content; /* Make the iframe fill the container's width */
                height: fit-content; /* Make the iframe fill the container's height */
                border: none; /* Remove the default iframe border */
            }
            .iframe1{
                zoom: 0.60; /* Scales the content to 60% in compatible browsers */
            }
            .iframe2{
                zoom: 0.50; /* Scales the content to 50% in compatible browsers */
            }
            .iframe3{
                zoom: 0.95; /* Scales the content to 95% in compatible browsers */
            }
            /* Optional: for basic responsiveness on smaller screens */
            @media (max-width: 768px) {
                .container {
                    /* Stacks columns vertically on screens smaller than 768px */
                    grid-template-columns: 1fr; 
                }
            }
        </style>
        <!--Clock Automation-->
        <script>
            function updateClocks() {
            const clocks = document.querySelectorAll('.clock-card');
        
            clocks.forEach(clock => {
                const tz = clock.getAttribute('data-timezone');
                const now = new Date();
                
                // Format time and date for specific timezone
                const timeStr = now.toLocaleTimeString('en-US', { timeZone: tz, hour12: true, hour: '2-digit', minute: '2-digit', second: '2-digit' });
                const dateStr = now.toLocaleDateString('en-US', { timeZone: tz, weekday: 'short', month: 'short', day: 'numeric' });
                
                clock.querySelector('.time-display').textContent = timeStr;
                clock.querySelector('.date-display').textContent = dateStr;
                });
            }
            // Update immediately, then every second
            updateClocks();
            setInterval(updateClocks, 1000);

        </script>
        <!--Automation for iFrame Reload-->
        <script>
                function refreshIframes() {
        // Select all iframes on the page
        const iframes = document.querySelectorAll('iframe');

        // Iterate over the iframes and reload their source
        iframes.forEach(iframe => {
            // Reassigning the src attribute triggers a reload
            iframe.src = iframe.src;
        });
    }

    // Set an interval to call the refreshIframes function every 5 minutes
    // 5 minutes = 300 seconds = 300,000 milliseconds
    setInterval(refreshIframes, 1000 * 60 * 5);
        </script>
    </head>
