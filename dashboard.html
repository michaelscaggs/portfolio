<!DOCTYPE html>
<html>
<head>
    <style>
        /* Use border-box to include padding and border in the element's total width */
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
            background-color: #000;
        }

        .sticky-header {
            position: -webkit-sticky; /* For Safari */
            position: sticky;
            top: 0;
            background-color: white; /* Prevents text from overlapping */
            z-index: 1000; /* Ensures it stays on top */
            width: 100%;
        }

        .world-clock-container {
            background-color: #000;
            justify-content: left;
            display: flex;
            gap: 0px;
            height: 30px;
            font-family: console;
            color: #4AF626;
        }

        .clock-box {
            border: none;
            padding: 10px;
            text-align: center;
            width: 150px;
        }

        /* Top Navbar */
        .navbar {
            background-color: #333;
            top: 0;
            width: 100%;
            height: 30px;
            display: flex;
            color: white;
            z-index: 1000;
            padding: 0 20px;
            box-sizing: border-box;
        }

            .navbar a {
                color: white;
                text-align: center;
                padding: 14px 16px;
                text-decoration: none;
            }

                .navbar a:hover {
                    background-color: #ddd;
                    color: black;
                }

        /* The dropdown container */
        .dropdown {
            float: left;
            overflow: visible;
        }

            /* Dropdown button */
            .dropdown .dropbtn {
                font-size: 16px;
                border: none;
                outline: none;
                color: white;
                padding: 14px 16px;
                background-color: inherit;
                font-family: inherit; /* Important for vertical align on mobile phones */
            }

            /* Add a red background color to navbar links on hover */
            .navbar a:hover, .dropdown:hover .dropbtn {
                background-color: red;
            }

        /* Dropdown content (hidden by default) */
        .dropdown-content {
            display: none;
            position: relative;
            background-color: #f9f9f9;
            min-width: 160px;
            box-shadow: 0px 8px 16px 0px rgba(0,0,0,0.2);
            z-index: 1000;
        }

            /* Links inside the dropdown */
            .dropdown-content a {
                float: none;
                color: black;
                padding: 12px 16px;
                text-decoration: none;
                display: block;
                text-align: left;
            }

                /* Add a grey background color to dropdown links on hover */
                .dropdown-content a:hover {
                    background-color: #ddd;
                }

        /* Show the dropdown menu on hover */
        .dropdown:hover .dropdown-content {
            display: block;
        }

        .container {
            width: 100%;
            padding: 50px;
            overflow: auto; /* Clears floats so container doesn't collapse */
            border: 5px;
            border-color: lightgreen;
            background-color: black;
        }

        .box {
            float: left;
            width: 50%; /* Creates two equal columns */
            height: 100%;
            border: 5px;
            text-align: left;
        }

        .container2 {
            width: 100%;
            overflow: auto; /* Clears floats so container doesn't collapse */
            border: 5px;
            border-color: red;
            background-color: black;
        }

        .box2 {
            float: left;
            width: 100%; /* Creates three equal columns */
            height: 100%;
            border: 5px;
            text-align: center;
        }
        
  .scaled-iframe {
    /* The Zoom Effect */
    transform: scale(0.60); /* Zoom to 75% */
    transform-origin: 0 0;  /* Ensures scaling starts from top-left */
  }
    </style>
    <title>Preferred Dashboard Template</title>
    <base target="_blank">
</head>
<body>
    <div class="sticky-header">
        <!-- World Clock -->
        <div class="world-clock-container">
            <div class="clock-box">UTC: <span id="utc"></span></div>
            <div class="clock-box">ET: <span id="est"></span></div>
            <div class="clock-box">CT: <span id="cst"></span></div>
            <div class="clock-box">MT: <span id="mst"></span></div>
            <div class="clock-box">AT: <span id="ast"></span></div>
            <div class="clock-box">PT: <span id="pst"></span></div>
            <div class="clock-box">HT: <span id="hst"></span></div>
        </div>
        <!-- Top Navbar -->
        <nav class="navbar">
            <a href="http://www.cnn.com">News</a>
            <a href="http://www.espn.com">Sports</a>
            <a href="http://www.weather.com">Weather</a>
            <div class="dropdown">
                <button class="dropbtn">Research Links
                    <i class="fa fa-caret-down"></i>
                </button>
                <div class="dropdown-content">
                    <a href="http://www.youtube.com">You Tube</a>
                    <a href="http://www.google.com">Google</a>
                    <a href="http://www.stackoverflow.com">Stack Overflow</a>
                </div>
            </div>
            <div class="dropdown">
                <button class="dropbtn">Social Media
                    <i class="fa fa-caret-down"></i>
                </button>
                <div class="dropdown-content">
                    <a href="http://www.facebook.com">Facebook</a>
                    <a href="http://www.twitter.com">Twitter</a>
                    <a href="http://www.linkedin.com">Linked In</a>
                </div>
            </div>
        </nav>
    </div>
    <main>
        <div class="container">
            <div class="box" style="background-color:black;">
                <iframe class="scaled-iframe" src="https://calendar.google.com/calendar/embed?height=600&wkst=1&ctz=America%2FNew_York&showPrint=0&showTitle=0&showTz=0&src=ZW4udXNhI2hvbGlkYXlAZ3JvdXAudi5jYWxlbmRhci5nb29nbGUuY29t&color=%23795548" style="border:solid 1px #777" width="800" height="600" frameborder="0" scrolling="no"></iframe>
            </div>
            <div class="box" style="background-color:black;">
                <iframe class="scaled-iframe" width="560" height="315" src="https://www.youtube.com/embed/1EChsxRI4Zg?si=m7_CZD1UWoH_-_QT" title="YouTube video player" frameborder="0" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share" referrerpolicy="strict-origin-when-cross-origin" allowfullscreen></iframe>
            </div>
        </div>
        <div class="container2">
            <div class="box2" style="background-color:black;">
                <iframe src="https://chatgpt.com/"></iframe>
            </div>
        </div>
    </main>
    <script>
        function updateClocks() {
            const now = new Date();

            document.getElementById("utc").textContent = now.toUTCString().split(' ')[4];
            document.getElementById("est").textContent = now.toLocaleTimeString("en-US", { timeZone: "America/New_York" });
            document.getElementById("cst").textContent = now.toLocaleTimeString("en-US", { timeZone: "America/Chicago" });
            document.getElementById("mst").textContent = now.toLocaleTimeString("en-US", { timeZone: "America/Denver" });
            document.getElementById("ast").textContent = now.toLocaleTimeString("en-US", { timeZone: "America/Phoenix" });
            document.getElementById("pst").textContent = now.toLocaleTimeString("en-US", { timeZone: "America/Los_Angeles" });
            document.getElementById("hst").textContent = now.toLocaleTimeString("en-US", { timeZone: "Pacific/Honolulu" });
        }

        // Update every second
        setInterval(updateClocks, 1000);
        updateClocks(); // Initial call
    </script>
</body>
</html>
